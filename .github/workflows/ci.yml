name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the libraries first: pixi + demo typecheck resolve @open-ui/core via
      # its built dist (the package `exports`), so dist must exist before tsc runs.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:demo
      - run: pnpm --filter @open-ui/site build

  e2e:
    name: device screenshots (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir examples/demo exec playwright install --with-deps chromium
      - run: pnpm --dir examples/demo test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: device-screenshots
          path: examples/demo/screenshots/
          if-no-files-found: ignore
