name: Release

# Publishes @open-slot-ui/core and @open-slot-ui/pixi to npm via OIDC TRUSTED PUBLISHING
# when a v* tag is pushed — no long-lived NPM_TOKEN secret.
#
#   # bump the package.json versions (core + pixi), commit, then:
#   git tag v0.1.1 && git push --follow-tags
#
# ── One-time npm setup (npmjs.com, by an @open-slot-ui scope owner) ──
# Trusted publishing pins ONE workflow file per package, so do this for BOTH
# @open-slot-ui/core and @open-slot-ui/pixi:
#   Package → Settings → Trusted Publisher → GitHub Actions, with:
#     Organization or user: <your GitHub owner>   (the repo owner)
#     Repository:           open-ui                (the GitHub repo name)
#     Workflow filename:    release.yml            (this file's name — exact)
#     Environment:          npm-publish            (must match `environment:` below)
# Once both entries exist, delete any old NPM_TOKEN repo secret.
#
# How auth works: with `id-token: write`, pnpm publish (native OIDC trusted
# publishing, added in pnpm 10.16.0 — this repo is on 10.32.1) exchanges this
# run's GitHub OIDC token for a short-lived npm publish token. Nothing
# long-lived is stored. Provenance attaches a signed SLSA attestation.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: build · test · publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url. setup-node would write ~/.npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}` and export a placeholder token;
          # the publisher then treats the placeholder as real, skips OIDC,
          # and 404s. With no registry-url, pnpm uses the default registry
          # with no token, so OIDC trusted publishing kicks in.

      # OIDC trusted publishing needs npm >= 11.5.1. Node 22 ships npm 10.9, and pnpm
      # delegates the actual publish to the npm binary — so without this the publish
      # falls back to classic auth and fails with ENEEDAUTH. Upgrade npm first.
      - run: npm install -g npm@latest
      - run: npm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      # Publishes every public workspace package (core, pixi) in dependency
      # order, converting `workspace:*` to the real version. Private packages
      # (demo, site, pixi-text-counter) are skipped automatically.
      - run: pnpm -r publish --access public --no-git-checks
        env:
          # No NODE_AUTH_TOKEN: auth is OIDC trusted publishing. Provenance
          # attaches a signed SLSA attestation (public package + repo only).
          NPM_CONFIG_PROVENANCE: 'true'
